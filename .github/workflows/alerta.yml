name: Alerta BPO

on:
  schedule:
    - cron: "*/2 * * * *"  # Tenta rodar a cada 2 minutos
  workflow_dispatch:       # Mantém o botão de rodar manual
  push:
    branches:
      - principal          # Acorda o robô sempre que houver mudança no código ou CSV
    paths:
      - 'enviados.csv'     # Foca especificamente na atualização do histórico
    
    # ADICIONE ESTA PARTE: Dá permissão para o robô escrever no seu repositório
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install pandas requests

      - name: Rodar script
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python alerta_bpo.py

      - name: Salvar histórico no GitHub
        run: |
          git config --global user.name "robô"
          git config --global user.email "bot@github.com"
          git add enviados.csv
          # O "|| echo" evita que o erro pare o processo se não houver novos IDs
          git commit -m "Atualização histórica [skip ci]" || echo "Sem mudanças para salvar"
          git push
